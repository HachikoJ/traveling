<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌴 五一广西·汕尾家庭旅行攻略</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
*{font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;box-sizing:border-box}
.gs{position:absolute;height:100%;border-radius:4px;cursor:pointer;transition:all .3s;display:flex;align-items:center;padding:0 5px;font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:2px;border-right:1.5px solid rgba(255,255,255,.35)}
.gs:hover{transform:scaleY(1.15);z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.sc{transition:all .3s;border-left:4px solid transparent;margin-bottom:8px;border-radius:8px;padding:10px 12px}
.sc.done{opacity:.5;background:#f0fdf4!important}.sc.done .st{text-decoration:line-through}
.sc.now{border-left-color:#f59e0b;box-shadow:0 0 0 2px rgba(245,158,11,.2)}
.ck{width:26px;height:26px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;flex-shrink:0;font-size:12px}
.ck:hover{border-color:#14b8a6;background:#f0fdfa}
.ck.on{border-color:#10b981;background:#10b981;color:#fff;animation:pop .3s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.toast{animation:su .4s}@keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.mbg{animation:fi .2s}@keyframes fi{from{opacity:0}to{opacity:1}}
.mbox{animation:ms .3s}@keyframes ms{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.ni{transition:all .2s;border-bottom:2px solid transparent}.ni.act{border-bottom-color:#0d9488;color:#0d9488}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.gw{overflow-x:auto;-webkit-overflow-scrolling:touch}.gi{min-width:620px}
@media(max-width:640px){.gi{min-width:520px}}
.pi{cursor:pointer;transition:all .2s}.pi.done{opacity:.4;text-decoration:line-through}
.gr{height:32px;position:relative;border-radius:6px;background:#f8fafc}.gm{position:absolute;top:0;bottom:0;width:1px;background:#e2e8f0;z-index:0}
.tc{max-height:0;overflow:hidden;transition:max-height .3s ease}.tc.open{max-height:600px}
.tab-content{animation:tf .25s ease-out}@keyframes tf{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bg-scene{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.035;animation:float 20s ease-in-out infinite}
.bg-blob-1{width:500px;height:500px;background:#14b8a6;top:-5%;left:-5%;animation-duration:25s}
.bg-blob-2{width:400px;height:400px;background:#a855f7;top:30%;right:-10%;animation-duration:30s;animation-delay:-10s}
.bg-blob-3{width:450px;height:450px;background:#0ea5e9;bottom:-5%;left:20%;animation-duration:28s;animation-delay:-18s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-30px) scale(1.08)}50%{transform:translate(-20px,20px) scale(.95)}75%{transform:translate(30px,10px) scale(1.02)}}
</style>
</head>
<body class="min-h-screen" style="background:linear-gradient(180deg,#f8fafc 0%,#f0f9ff 30%,#faf5ff 60%,#f0fdf4 100%);background-attachment:fixed">
<div class="bg-scene" aria-hidden="true"><div class="bg-blob bg-blob-1"></div><div class="bg-blob bg-blob-2"></div><div class="bg-blob bg-blob-3"></div></div>
<header class="bg-gradient-to-r from-teal-700 via-teal-600 to-emerald-600 text-white sticky top-0 z-50 shadow-lg">
<div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
<div><h1 class="text-lg sm:text-xl font-bold">🌴 五一广西·汕尾家庭旅行</h1><p class="text-teal-100 text-xs sm:text-sm mt-0.5">4.28-5.5 · 8天6晚 · 一家四口</p></div>
<div class="flex items-center gap-2">
<button id="undoBtn" class="bg-white/10 hover:bg-white/20 rounded-lg px-3 py-1.5 text-xs font-medium disabled:opacity-30" disabled onclick="undo()">↩️撤回</button>
<button class="bg-white/10 hover:bg-white/20 rounded-lg px-3 py-1.5 text-xs font-medium" onclick="resetAll()">🔄重置</button>
</div>
</div></header>
<nav class="bg-white border-b sticky top-[52px] z-40 shadow-sm">
<div class="max-w-5xl mx-auto px-4 flex overflow-x-auto">
<button class="ni act px-4 py-2.5 text-sm font-medium whitespace-nowrap" data-t="overview" onclick="swTab('overview')">📊总览</button>
<button class="ni px-4 py-2.5 text-sm font-medium whitespace-nowrap text-gray-500" data-t="daily" onclick="swTab('daily')">📅每日行程</button>
<button class="ni px-4 py-2.5 text-sm font-medium whitespace-nowrap text-gray-500" data-t="guide" onclick="swTab('guide')">📖攻略</button>
<button class="ni px-4 py-2.5 text-sm font-medium whitespace-nowrap text-gray-500" data-t="packing" onclick="swTab('packing')">🎒行李</button>
</div></nav>
<main class="max-w-5xl mx-auto px-4 py-6">
<section id="tab-overview"></section>
<section id="tab-daily" class="hidden"></section>
<section id="tab-guide" class="hidden"></section>
<section id="tab-packing" class="hidden"></section>
</main>
<div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center">
<div class="mbg absolute inset-0 bg-black/50" onclick="closeModal()"></div>
<div class="mbox relative bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-md mx-4 p-5 shadow-2xl"><div id="modal-body"></div></div>
</div>
<div id="toasts" class="fixed bottom-4 left-4 right-4 sm:left-auto sm:right-4 sm:w-96 z-50 space-y-2"></div>
<script src="travel-data.js?v=20260422e"></script>
<script src="travel-app.js?v=20260422e"></script>
</body>
</html>
